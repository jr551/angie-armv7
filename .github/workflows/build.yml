name: build-armv7
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      angie_version:
        description: "Angie version"
        required: false
        default: "1.11.4"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm/v7

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm/v7
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/angie:armv7
            ghcr.io/${{ github.repository_owner }}/angie:${{ inputs.angie_version || '1.11.4' }}-armv7
          build-args: |
            ANGIE_VERSION=${{ inputs.angie_version || '1.11.4' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
